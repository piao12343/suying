name: build

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Douyin video URL (leave empty to poll Cloudflare)'
        required: false
        type: string

env:
  SUYING_OPENROUTER_API_KEY: ${{ secrets.SUYING_OPENROUTER_API_KEY }}
  SUYING_PEXELS_API_KEY: ${{ secrets.SUYING_PEXELS_API_KEY }}
  SUYING_LISTENER_SECRET: ${{ secrets.SUYING_LISTENER_SECRET }}
  SUYING_LISTENER_WORKER_URL: ${{ secrets.SUYING_LISTENER_WORKER_URL }}
  SUYING_PUSHPLUS_TOKEN: ${{ secrets.SUYING_PUSHPLUS_TOKEN }}
  SUYING_TTS_VOICE: ${{ secrets.SUYING_TTS_VOICE }}
  SUYING_TTS_RATE: ${{ secrets.SUYING_TTS_RATE }}
  SUYING_OPENROUTER_MODEL: ${{ secrets.SUYING_OPENROUTER_MODEL }}
  SUYING_PUB_DESC: ${{ secrets.SUYING_PUB_DESC }}
  SUYING_AUTO_PUBLISH: ${{ secrets.SUYING_AUTO_PUBLISH }}
  SUYING_PUBLISH_INTERVAL_MINUTES: ${{ secrets.SUYING_PUBLISH_INTERVAL_MINUTES }}
  SUYING_REWRITE_CUSTOM_INSTRUCTION: ${{ secrets.SUYING_REWRITE_CUSTOM_INSTRUCTION }}
  SUYING_REWRITE_TEMPLATE_TEXT: ${{ secrets.SUYING_REWRITE_TEMPLATE_TEXT }}
  SUYING_DEBUG_LOGS: ${{ secrets.SUYING_DEBUG_LOGS }}
  SUYING_GH_PAT: ${{ secrets.SUYING_GH_PAT }}

jobs:
  poll-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ======== Phase 1: lightweight poll ========
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for pending links
        id: poll
        run: |
          pip install requests --quiet
          python -c "
          import requests, os, json

          manual_url = '${{ github.event.inputs.url }}'
          if manual_url:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_work=true\n')
                  f.write('links=' + json.dumps([manual_url]) + '\n')
              exit(0)

          url = os.environ.get('SUYING_LISTENER_WORKER_URL', '').rstrip('/')
          secret = os.environ.get('SUYING_LISTENER_SECRET', '')
          if not url or not secret:
              print('Worker URL or Secret not configured')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_work=false\n')
              exit(0)

          try:
              resp = requests.get(f'{url}/api/poll', params={'secret': secret}, timeout=15)
              if resp.status_code == 200:
                  data = resp.json()
                  links = [i['link'] for i in data.get('links', []) if i.get('link')]
                  if links:
                      with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                          f.write('has_work=true\n')
                          f.write('links=' + json.dumps(links) + '\n')
                  else:
                      with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                          f.write('has_work=false\n')
              else:
                  print(f'Poll returned {resp.status_code}')
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('has_work=false\n')
          except Exception as e:
              print(f'Poll error: {e}')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_work=false\n')
          "

      # ======== Early exit if no work ========
      - name: No pending links
        if: steps.poll.outputs.has_work != 'true'
        run: echo "No pending links found. Exiting early."

      # ======== Phase 2: full pipeline (only when work exists) ========
      - name: Install system dependencies
        if: steps.poll.outputs.has_work == 'true'
        run: |
          python 源码/cloud_log_relay.py --line "GitHub Actions 已取到链接, 开始准备系统环境。"
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk xvfb
          python 源码/cloud_log_relay.py --line "系统依赖安装完成。"

      - name: Cache pip packages
        if: steps.poll.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('配置/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache faster-whisper model
        if: steps.poll.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: 缓存/hf_models
          key: whisper-model-small-v3
          restore-keys: whisper-model-small-

      - name: Cache Playwright browsers
        if: steps.poll.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: browser-${{ runner.os }}-chromium-v2
          restore-keys: browser-${{ runner.os }}-

      - name: Cache social-auto-upload
        if: steps.poll.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: 配置/social-auto-upload
          key: sau-${{ runner.os }}-${{ hashFiles('源码/cloud_patch_sau.py') }}-v1
          restore-keys: sau-${{ runner.os }}-

      - name: Install Python dependencies
        if: steps.poll.outputs.has_work == 'true'
        run: |
          python 源码/cloud_log_relay.py --line "开始安装 Python 依赖和浏览器。"
          pip install -r 配置/requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium
          python 源码/cloud_log_relay.py --line "Python 依赖和 Playwright 浏览器安装完成。"

      - name: Clone social-auto-upload
        if: steps.poll.outputs.has_work == 'true'
        run: |
          python 源码/cloud_log_relay.py --line "开始准备 social-auto-upload 发布组件。"
          if [ ! -f 配置/social-auto-upload/uploader/douyin_uploader/main.py ]; then
            rm -rf 配置/social-auto-upload
            git clone --depth 1 https://github.com/dreammis/social-auto-upload.git 配置/social-auto-upload
          else
            echo "Using cached social-auto-upload"
          fi
          cd 配置/social-auto-upload
          cp conf.example.py conf.py
          python "${{ github.workspace }}/源码/cloud_patch_sau.py"
          pip install -r requirements.txt
          pip install patchright opencv-python-headless segno
          python -m patchright install chromium
          python -m patchright install-deps chromium
          echo "SAU_DIR=${{ github.workspace }}/配置/social-auto-upload" >> $GITHUB_ENV
          python "${{ github.workspace }}/源码/cloud_log_relay.py" --line "social-auto-upload 发布组件准备完成。"

      - name: Write Douyin cookies
        if: steps.poll.outputs.has_work == 'true'
        run: |
          python 源码/cloud_log_relay.py --line "开始写入抖音 cookie。"
          mkdir -p 配置/cookies
          echo '${{ secrets.DOUYIN_COOKIES_JSON }}' > 配置/cookies/douyin_creator.json
          python 源码/cloud_log_relay.py --line "抖音 cookie 写入完成。"

      - name: Process videos
        if: steps.poll.outputs.has_work == 'true'
        env:
          FFMPEG_PATH: /usr/bin/ffmpeg
          SAU_DIR: ${{ github.workspace }}/配置/social-auto-upload
          SUYING_PENDING_LINKS: ${{ steps.poll.outputs.links }}
        run: |
          set +e
          set -o pipefail
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
            python 源码/cli_pipeline.py --poll 2>&1 | python 源码/cloud_log_relay.py
          codes=("${PIPESTATUS[@]}")
          code=${codes[0]}
          relay_code=${codes[1]}
          if [ "$code" -eq 0 ] && [ "$relay_code" -ne 0 ]; then
            code=$relay_code
          fi
          if [ "$code" -eq 0 ]; then
            python 源码/cloud_log_relay.py --line "云端任务完成。" --status success
          else
            python 源码/cloud_log_relay.py --line "云端任务失败, 退出码: $code" --status failed
          fi
          exit "$code"

      - name: Save refreshed Douyin cookies
        if: steps.poll.outputs.has_work == 'true' && success()
        env:
          GH_TOKEN: ${{ env.SUYING_GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SUYING_GH_PAT is not configured; cannot save refreshed Douyin cookies."
            exit 1
          fi
          if [ ! -s 配置/cookies/douyin_creator.json ]; then
            echo "Douyin cookie file missing or empty; skip saving."
            exit 1
          fi
          gh secret set DOUYIN_COOKIES_JSON --repo "${{ github.repository }}" < 配置/cookies/douyin_creator.json
          python 源码/cloud_log_relay.py --line "抖音 cookie 已回写到 GitHub Secret。"

      - name: Upload artifacts
        if: steps.poll.outputs.has_work == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: suying-outputs-${{ github.run_number }}
          path: 作品/
          retention-days: 7
